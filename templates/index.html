<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Media Hub</title>
    <link rel="stylesheet" href="/mmh/static/css/style.css">
    <link rel="stylesheet" href="/mmh/static/css/layout.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="/mmh/" class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24">
                    <path d="M3 13a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1v-6a1 1 0 0 0-1-1h-2v-2a4 4 0 0 0-8 0v2H3zm8-8a2 2 0 1 1 0 4 2 2 0 0 1 0-4z"/>
                </svg>
                <span>My Media Hub</span>
            </a>

            <nav class="nav-menu">
                <a href="/mmh/photos" class="nav-link">Photos</a>
                <a href="/mmh/images" class="nav-link">Images</a>
                <a href="#videos" class="nav-link">Videos</a>
                <a href="#audio" class="nav-link">Audio</a>
                <a href="#" class="nav-link">Collections</a>
            </nav>

            <div class="header-actions">
                <div class="search-box">
                    <input type="text" placeholder="Search for images, videos, audio and more" />
                    <svg class="search-icon" viewBox="0 0 24 24">
                        <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                </div>
                <a href="/mmh/register" id="registerButton" class="explore-link" data-auth-register>Register</a>
                <a href="/mmh/my-media" id="myMediaButton" class="sign-in" style="display: none; text-decoration: none;">My Media</a>
                <a href="/mmh/login" id="authButton" class="sign-in" style="text-decoration: none;">Sign in</a>
            </div>
        </div>
    </header>

    <main class="home-page">
        <section class="home-hero">
            <div class="home-hero-content">
                <h1>Storage for all your media</h1>
                <p>Store and manage all your images, videos, and audio in one place</p>

                <form class="home-search" id="homeSearchForm" action="/mmh/images" method="get">
                    <svg class="home-search-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    <input type="search" name="q" placeholder="Search for images, videos, audio and more..." aria-label="Search My Media Hub">
                    <select name="type" aria-label="Media type">
                        <option>Media</option>
                        <option value="photos">Photos</option>
                        <option>Images</option>
                        <option>Videos</option>
                        <option>Audio</option>
                    </select>
                    <button type="submit">Search</button>
                </form>

                <div class="popular-searches" aria-label="Popular searches">
                    <span>Popular searches:</span>
                    <a href="/mmh/images">business</a>
                    <a href="/mmh/images">nature</a>
                    <a href="/mmh/images">technology</a>
                    <a href="/mmh/images">people</a>
                    <a href="/mmh/images">background</a>
                    <a href="/mmh/images">travel</a>
                </div>
            </div>
        </section>

        <section class="home-section-grid" aria-label="My Media Hub sections">
            <a class="home-section-card" href="/mmh/photos" aria-label="Browse photos">
                <img src="/mmh/static/images/feature-photos.png" alt="Photos preview">
            </a>
            <a class="home-section-card" id="images" href="/mmh/images" aria-label="Browse images">
                <img src="/mmh/static/images/feature-images.png" alt="Images preview">
            </a>
            <a class="home-section-card" id="videos" href="/mmh/images" aria-label="Browse videos">
                <img src="/mmh/static/images/feature-videos.png" alt="Videos preview">
            </a>
            <a class="home-section-card" id="audio" href="/mmh/images" aria-label="Browse audio">
                <img src="/mmh/static/images/feature-audio.png" alt="Audio preview">
            </a>
        </section>
    </main>
    <script src="/mmh/static/js/paths.js"></script>
    <script src="/mmh/static/js/header-auth.js"></script>
    <script>
        document.getElementById('homeSearchForm')?.addEventListener('submit', (event) => {
            const form = event.currentTarget;
            const type = String(form.elements.type?.value || '').toLowerCase();
            form.action = type === 'photos' ? '/mmh/photos' : '/mmh/images';
        });
    </script>
</body>
</html>
